<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ════════════════════════════════════════════════════
       🎯 TITRE — Personnaliser
       ════════════════════════════════════════════════════ -->
  <title>Histoire Master — Lexique</title>

  <style>

    /* ════════════════════════════════════════════════════
       🎨 PALETTE — Même couleurs que quiz.html
       ════════════════════════════════════════════════════ */
    :root {
      --primary  : #922B21;
      --secondary: #c0392b;
      --success  : #48bb78;
      --bg       : #f7fafc;
      --text     : #2d3748;
    }

    /* ── Reset global ── */
    *, *::before, *::after {
      box-sizing : border-box;
      margin     : 0;
      padding    : 0;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      background : linear-gradient(135deg, var(--primary), var(--secondary));
      min-height : 100vh;
      padding    : 15px;
    }

    /* ── Conteneur principal ── */
    .container {
      background   : white;
      max-width    : 920px;
      margin       : 0 auto;
      border-radius: 20px;
      padding      : 25px;
      box-shadow   : 0 15px 40px rgba(0,0,0,.2);
    }

    /* ── Titre ── */
    h1       { text-align: center; color: var(--text); margin-bottom: 5px; font-size: 1.9em; }
    .subtitle{ text-align: center; color: #718096; margin-bottom: 20px; font-size: .95em; }

    /* ── Navigation ── */
    .nav-links   { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav-links a { padding: 9px 18px; background: var(--primary); color: white; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: .9em; transition: all .25s; }
    .nav-links a:hover { background: var(--secondary); transform: translateY(-2px); }

    /* ── Barre de recherche ── */
    .search-box       { width: 100%; padding: 13px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1em; margin-bottom: 16px; outline: none; transition: border-color .2s; }
    .search-box:focus { border-color: var(--primary); }

    /* ── Filtres par niveau ── */
    .level-tabs     { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
    .level-tab      { padding: 7px 13px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 16px; cursor: pointer; font-weight: bold; font-size: .8em; transition: all .25s; }
    .level-tab:hover,
    .level-tab.active { background: var(--primary); color: white; }

    /* ── Compteur ── */
    .stat-bar { text-align: center; font-size: .85em; color: #718096; margin-bottom: 12px; }

    /* ════════════════════════════════════════════════════
       📇 GRILLE DE MOTS
       ════════════════════════════════════════════════════ */
    .lex-grid {
      display              : grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap                  : 13px;
    }

    .word-card         { background: #f8fafc; border: 2px solid transparent; border-radius: 13px; padding: 17px; cursor: pointer; transition: all .25s; position: relative; }
    .word-card:hover   { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.1); border-color: var(--primary); }
    .word-main         { font-size: 1.2em; font-weight: bold; color: var(--primary); margin-bottom: 4px; }
    .word-trans        { font-size: .95em; color: var(--text); margin-bottom: 7px; }
    .word-cat          { font-size: .72em; color: #718096; background: #e2e8f0; padding: 2px 9px; border-radius: 9px; display: inline-block; }
    .word-lv           { position: absolute; top: 9px; right: 9px; font-size: .68em; color: white; background: var(--secondary); padding: 2px 7px; border-radius: 7px; }
    .empty-msg         { text-align: center; color: #999; padding: 40px; grid-column: 1 / -1; }

    /* ════════════════════════════════════════════════════
       🔍 MODALE DE DÉTAIL
       ════════════════════════════════════════════════════ */
    .modal-overlay         { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; }
    .modal-overlay.show    { display: flex; }
    .modal-content         { background: white; border-radius: 18px; padding: 26px; max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto; animation: popIn .25s ease; }
    @keyframes popIn       { from { opacity: 0; transform: scale(.92); } to { opacity: 1; transform: scale(1); } }
    .modal-main            { font-size: 1.9em; font-weight: bold; color: var(--primary); margin-bottom: 4px; }
    .modal-trans           { font-size: 1.2em; color: var(--text); margin-bottom: 14px; }
    .modal-sec             { margin: 12px 0; padding: 12px 15px; background: #f7fafc; border-radius: 10px; }
    .modal-sec h4          { color: var(--secondary); margin-bottom: 6px; font-size: .85em; text-transform: uppercase; letter-spacing: .5px; }
    .modal-close           { background: var(--primary); color: white; border: none; padding: 11px 22px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 13px; width: 100%; }

    /* ── Responsive ── */
    @media (max-width: 600px) { .lex-grid { grid-template-columns: 1fr 1fr; } }

  </style>
</head>
<body>
<div class="container">

  <!-- ════════════════════════════════════════════════════
       🔝 EN-TÊTE — Personnaliser l'emoji et le nom
       ════════════════════════════════════════════════════ -->
  <h1>🏛️ Lexique Histoire Master</h1>
  <p class="subtitle">60 mots essentiels — Niveaux 1 à 5</p>

  <!-- Navigation -->
  <div class="nav-links">
    <a href="index.html">🏠 Accueil</a>
    <a href="dashboard.html">📊 Dashboard</a>
  </div>

  <!-- Compteur de mots affichés -->
  <div class="stat-bar" id="statBar">0 mots disponibles</div>

  <!-- Barre de recherche -->
  <input type="text"
         class="search-box"
         id="searchBox"
         placeholder="Chercher un mot, une date, un événement…"
         oninput="filterWords()">

  <!-- Filtres par niveau — ajouter ou supprimer des boutons selon le nombre de niveaux -->
  <div class="level-tabs">
    <button class="level-tab active" onclick="filterByLevel(0, this)">Tous</button>
    <button class="level-tab"        onclick="filterByLevel(1, this)">Niv. 1</button>
    <button class="level-tab"        onclick="filterByLevel(2, this)">Niv. 2</button>
    <button class="level-tab"        onclick="filterByLevel(3, this)">Niv. 3</button>
    <button class="level-tab"        onclick="filterByLevel(4, this)">Niv. 4</button>
    <button class="level-tab"        onclick="filterByLevel(5, this)">Niv. 5</button>
    <!-- ↑ Ajouter "Niv. 6", "Niv. 7"… si besoin -->
  </div>

  <!-- Grille des mots — injectée par renderWords() -->
  <div class="lex-grid" id="lexGrid"></div>

</div><!-- /.container -->


<!-- Modale de détail d'un mot -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-main"  id="modalMain"></div>
    <div class="modal-trans" id="modalTrans"></div>
    <div class="modal-sec"><h4>📖 Définition</h4><p id="modalDef"></p></div>
    <div class="modal-sec"><h4>💬 Exemple</h4>   <p id="modalEx"  style="font-style:italic;"></p></div>
    <div class="modal-sec"><h4>📝 Catégorie</h4> <p id="modalCat"></p></div>
    <button class="modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     📜 JAVASCRIPT
     ══════════════════════════════════════════════════════ -->
<script>

  /* ══════════════════════════════════════════════════════
     📖 LEXIQUE — Tableau de mots
         Chaque mot contient :
           main  → terme principal (mot en anglais, notion, date…)
           trans → traduction ou définition courte
           def   → définition complète
           ex    → exemple d'utilisation
           level → numéro de niveau (1, 2, 3…)
           cat   → catégorie (verbe, nom, date, événement…)

     ↓ REMPLACER CES EXEMPLES PAR LE VRAI CONTENU ↓
     ══════════════════════════════════════════════════════ */
  const LEXIQUE = [
  // NIVEAU 1 — Préhistoire & Antiquité
  { main:"Préhistoire", trans:"avant l'écriture", def:"Période allant des premiers hominidés à l'invention de l'écriture (-3300).", ex:"La Préhistoire s'arrête avec l'écriture cunéiforme.", level:1, cat:"période"},
  { main:"Paléolithique", trans:"âge de la pierre taillée", def:"Période ancienne de la Préhistoire (-3M à -10000), chasseurs-cueilleurs.", ex:"Lascaux est une grotte du Paléolithique supérieur.", level:1, cat:"période"},
  { main:"Néolithique", trans:"âge de la pierre polie", def:"Période de sédentarisation, agriculture et élevage (-5500 à -3300).", ex:"Le Néolithique voit naître les premiers villages.", level:1, cat:"période"},
  { main:"Mésopotamie", trans:"entre les fleuves", def:"Région entre le Tigre et l'Euphrate, berceau de l'écriture.", ex:"Les Sumériens habitaient la Mésopotamie.", level:1, cat:"civilisation"},
  { main:"cunéiforme", trans:"écriture en forme de coin", def:"Premier système d'écriture inventé par les Sumériens sur tablettes d'argile.", ex:"L'écriture cunéiforme date de -3300.", level:1, cat:"écriture"},
  { main:"hiéroglyphes", trans:"écriture sacrée", def:"Écriture pictographique des Égyptiens anciens.", ex:"Champollion a déchiffré les hiéroglyphes en 1822.", level:1, cat:"écriture"},
  { main:"pharaon", trans:"roi d'Égypte", def:"Souverain de l'Égypte ancienne, considéré comme un dieu.", ex:"Ramsès II est un célèbre pharaon.", level:1, cat:"titre"},
  { main:"pyramide", trans:"tombeau monumental", def:"Édifice à base carrée construit par les Égyptiens pour les pharaons.", ex:"La pyramide de Khéops fait 146 m de haut.", level:1, cat:"monument"},
  { main:"cité-État", trans:"ville indépendante", def:"Ville constituant un État autonome, comme Athènes ou Sparte.", ex:"La Grèce antique était divisée en cités-États.", level:1, cat:"politique"},
  { main:"démocratie", trans:"pouvoir du peuple", def:"Régime politique où le peuple exerce le pouvoir.", ex:"Athènes est le berceau de la démocratie.", level:1, cat:"politique"},
  { main:"République", trans:"régime sans roi", def:"Régime où le chef de l'État est élu et non héréditaire.", ex:"Rome est devenue une République en -509.", level:1, cat:"politique"},
  { main:"Empire", trans:"vaste territoire dominé", def:"État étendu dirigé par un empereur.", ex:"L'Empire romain a duré plusieurs siècles.", level:1, cat:"politique"},
  { main:"gladiateur", trans:"combattant de l'arène", def:"Combattant esclave ou prisonnier dans les jeux romains.", ex:"Le Colisée accueillait les combats de gladiateurs.", level:1, cat:"société"},
  { main:"Pax Romana", trans:"paix romaine", def:"Période de paix et de stabilité sous l'empereur Auguste.", ex:"La Pax Romana a duré de -27 à 180 apr. J.-C.", level:1, cat:"période"},
  // NIVEAU 2 — Moyen Âge
  { main:"féodalité", trans:"système des fiefs", def:"Organisation sociale et politique basée sur la vassalité et les fiefs.", ex:"La féodalité structure la société médiévale.", level:2, cat:"société"},
  { main:"vassal", trans:"homme lige", def:"Personne liée à un seigneur par un serment de fidélité.", ex:"Le vassal prête hommage à son seigneur.", level:2, cat:"société"},
  { main:"fief", trans:"terre accordée", def:"Domaine foncier concédé par un seigneur à un vassal.", ex:"Le chevalier reçoit un fief en échange de son service.", level:2, cat:"société"},
  { main:"serf", trans:"paysan dépendant", def:"Paysan lié à la terre d'un seigneur, non libre.", ex:"Le serf travaille la terre du seigneur.", level:2, cat:"société"},
  { main:"Croisades", trans:"expéditions militaires", def:"Guerres menées par les chrétiens pour reconquérir Jérusalem (1095-1291).", ex:"La première Croisade est prêchée par Urbain II.", level:2, cat:"événement"},
  { main:"monastère", trans:"communauté religieuse", def:"Lieu où vivent des moines ou des nonnes.", ex:"Les moines copiaient les manuscrits dans les monastères.", level:2, cat:"religion"},
  { main:"gothique", trans:"style architectural", def:"Style d'architecture avec arcs-boutants et vitraux (XIIe-XVe siècle).", ex:"Notre-Dame de Paris est une cathédrale gothique.", level:2, cat:"art"},
  { main:"château fort", trans:"forteresse médiévale", def:"Édifice fortifié résidence d'un seigneur.", ex:"Le château fort protégeait les habitants des attaques.", level:2, cat:"monument"},
  { main:"blason", trans:"armoiries", def:"Écusson portant les armes d'une famille noble.", ex:"Chaque chevalier avait son blason.", level:2, cat:"symbole"},
  { main:"troubadour", trans:"poète musicien", def:"Poète et musicien itinérant du Moyen Âge.", ex:"Les troubadours chantaient l'amour courtois.", level:2, cat:"art"},
  { main:"chevalier", trans:"guerrier à cheval", def:"Homme de guerre formé par les armes et les codes de l'honneur.", ex:"Le chevalier suivait le code de chevalerie.", level:2, cat:"société"},
  { main:"imprimerie", trans:"presse à caractères mobiles", def:"Technique inventée par Gutenberg vers 1450 pour reproduire des textes.", ex:"L'imprimerie a révolutionné la diffusion du savoir.", level:2, cat:"technique"},
  // NIVEAU 3 — Temps Modernes
  { main:"conquistador", trans:"conquérant espagnol", def:"Explorateur espagnol qui a conquis l'Amérique.", ex:"Cortés et Pizarre étaient des conquistadors.", level:3, cat:"personnage"},
  { main:"traite négrière", trans:"commerce d'esclaves", def:"Commerce triangulaire d'esclaves africains vers les Amériques.", ex:"La traite négrière a déporté 12 millions d'Africains.", level:3, cat:"économie"},
  { main:"colonie", trans:"territoire dominé", def:"Territoire occupé et gouverné par une puissance étrangère.", ex:"L'Amérique était une colonie espagnole.", level:3, cat:"politique"},
  { main:"Réforme", trans:"réforme protestante", def:"Mouvement religieux du XVIe siècle critiquant l'Église catholique.", ex:"Luther a déclenché la Réforme en 1517.", level:3, cat:"religion"},
  { main:"protestantisme", trans:"religion réformée", def:"Ensemble des Églises nées de la Réforme.", ex:"Le protestantisme s'est répandu en Europe du Nord.", level:3, cat:"religion"},
  { main:"absolutisme", trans:"pouvoir absolu", def:"Régime où le roi détient tout le pouvoir sans partage.", ex:"Louis XIV incarne l'absolutisme.", level:3, cat:"politique"},
  { main:"Lumières", trans:"siècle des Lumières", def:"Mouvement intellectuel du XVIIIe siècle valorant la raison.", ex:"Voltaire et Rousseau étaient des philosophes des Lumières.", level:3, cat:"pensée"},
  { main:"philosophe", trans:"penseur", def:"Personne qui réfléchit sur les questions fondamentales.", ex:"Montesquieu a écrit 'L'Esprit des lois'.", level:3, cat:"pensée"},
  { main:"Encyclopédie", trans:"ouvrage de référence", def:"Dictionnaire raisonné des sciences, des arts et des métiers (1751-1772).", ex:"Diderot et d'Alembert ont dirigé l'Encyclopédie.", level:3, cat:"ouvrage"},
  { main:"traité", trans:"accord international", def:"Convention signée entre plusieurs États.", ex:"Le traité de Westphalie a mis fin à la guerre de Trente Ans.", level:3, cat:"diplomatie"},
  // NIVEAU 4 — Révolution & 19e siècle
  { main:"Révolution", trans:"changement brutal", def:"Transformation profonde et rapide d'un régime politique.", ex:"La Révolution française a commencé en 1789.", level:4, cat:"événement"},
  { main:"Tiers-État", trans:"peuple", def:"Ordre regroupant le peuple (bourgeois, paysans, artisans) sous l'Ancien Régime.", ex:"Le Tiers-État réclame l'égalité en 1789.", level:4, cat:"société"},
  { main:"guillotine", trans:"instrument de décapitation", def:"Machine inventée pour exécuter les condamnés à mort.", ex:"Louis XVI est guillotiné le 21 janvier 1793.", level:4, cat:"justice"},
  { main:"Terreur", trans:"régime de terreur", def:"Période de la Révolution (1793-1794) marquée par les exécutions massives.", ex:"Robespierre dirige la Terreur.", level:4, cat:"période"},
  { main:"coup d'État", trans:"prise de pouvoir par la force", def:"Action violente pour renverser un gouvernement.", ex:"Le 18 brumaire est un coup d'État de Napoléon.", level:4, cat:"politique"},
  { main:"Code civil", trans:"code napoléonien", def:"Ensemble des lois civiles promulguées par Napoléon en 1804.", ex:"Le Code civil établit l'égalité devant la loi.", level:4, cat:"droit"},
  { main:"industrialisation", trans:"développement industriel", def:"Transformation économique basée sur l'industrie et la machine.", ex:"L'industrialisation commence en Angleterre au XVIIIe siècle.", level:4, cat:"économie"},
  { main:"prolétariat", trans:"classe ouvrière", def:"Classe sociale des travailleurs salariés n'ayant que leur force de travail.", ex:"Le prolétariat travaille dans les usines.", level:4, cat:"société"},
  { main:"bourgeoisie", trans:"classe possédante", def:"Classe sociale des propriétaires, commerçants et intellectuels.", ex:"La bourgeoisie dirige les affaires économiques.", level:4, cat:"société"},
  { main:"colonialisme", trans:"domination coloniale", def:"Politique d'expansion et de domination sur des territoires étrangers.", ex:"Le colonialisme français s'étend en Afrique et en Asie.", level:4, cat:"politique"},
  { main:"suffrage universel", trans:"droit de vote pour tous", def:"Droit de vote accordé à tous les citoyens adultes.", ex:"Le suffrage universel masculin est instauré en 1848.", level:4, cat:"droit"},
  { main:"Commune", trans:"insurrection parisienne", def:"Gouvernement révolutionnaire de Paris en 1871.", ex:"La Commune de Paris dure 72 jours.", level:4, cat:"événement"},
  // NIVEAU 5 — 20e siècle
  { main:"totalitarisme", trans:"régime dictatorial total", def:"Régime politique contrôlant tous les aspects de la vie.", ex:"Le nazisme et le stalinisme sont des totalitarismes.", level:5, cat:"politique"},
  { main:"génocide", trans:"extermination d'un peuple", def:"Destruction systématique d'un groupe ethnique ou religieux.", ex:"L'Holocauste est le génocide des Juifs par les nazis.", level:5, cat:"crime"},
  { main:"Holocauste", trans:"Shoah", def:"Extermination de 6 millions de Juifs par le régime nazi.", ex:"L'Holocauste reste le crime le plus horrible du XXe siècle.", level:5, cat:"crime"},
  { main:"Débarquement", trans:"invasion alliée", def:"Opération militaire alliée en Normandie le 6 juin 1944.", ex:"Le Débarquement ouvre le second front en Europe.", level:5, cat:"événement"},
  { main:"Résistance", trans:"mouvement de résistance", def:"Ensemble des mouvements luttant contre l'occupant nazi.", ex:"La Résistance française aide les Alliés.", level:5, cat:"mouvement"},
  { main:"Guerre froide", trans:"confrontation Est-Ouest", def:"Période de tensions entre les USA et l'URSS (1947-1991).", ex:"La Guerre froide divise le monde en deux blocs.", level:5, cat:"période"},
  { main:"décolonisation", trans:"indépendance des colonies", def:"Processus d'accession à l'indépendance des colonies.", ex:"La décolonisation touche l'Afrique et l'Asie après 1945.", level:5, cat:"politique"},
  { main:"mur de Berlin", trans:"symbole de la division", def:"Mur érigé en 1961 séparant Berlin-Est et Berlin-Ouest.", ex:"Le mur de Berlin tombe le 9 novembre 1989.", level:5, cat:"monument"},
  { main:"OTAN", trans:"Alliance atlantique", def:"Organisation du traité de l'Atlantique Nord (1949).", ex:"L'OTAN regroupe les pays alliés des USA.", level:5, cat:"organisation"},
  { main:"URSS", trans:"Union soviétique", def:"Union des Républiques socialistes soviétiques (1922-1991).", ex:"L'URSS disparaît en décembre 1991.", level:5, cat:"pays"},
  { main:"armistice", trans:"arrêt des combats", def:"Accord mettant fin aux hostilités.", ex:"L'armistice de 1918 est signé le 11 novembre.", level:5, cat:"diplomatie"},
  { main:"traite négrière", trans:"commerce triangulaire", def:"Commerce d'esclaves entre l'Afrique, l'Amérique et l'Europe.", ex:"La traite négrière a déporté des millions d'Africains.", level:5, cat:"économie"}
];
  /* fin LEXIQUE */


  /* ══════════════════════════════════════════════════════
     🔧 ÉTAT DES FILTRES
     ══════════════════════════════════════════════════════ */
  let currentLevel  = 0;   /* 0 = tous les niveaux */
  let currentSearch = "";


  /* ══════════════════════════════════════════════════════
     🖼️ RENDU DE LA GRILLE
     ══════════════════════════════════════════════════════ */

  function renderWords() {
    const grid     = document.getElementById("lexGrid");
    const s        = currentSearch.toLowerCase();

    /* Filtre par recherche + niveau */
    const filtered = LEXIQUE.filter(w => {
      const matchSearch = !s ||
        w.main.toLowerCase().includes(s)  ||
        w.trans.toLowerCase().includes(s) ||
        w.def.toLowerCase().includes(s);
      const matchLevel  = currentLevel === 0 || w.level === currentLevel;
      return matchSearch && matchLevel;
    });

    /* Compteur */
    document.getElementById("statBar").textContent =
      filtered.length + " mot" + (filtered.length > 1 ? "s" : "") + " affiché" + (filtered.length > 1 ? "s" : "");

    if (!filtered.length) {
      grid.innerHTML = "<div class='empty-msg'>Aucun mot trouvé pour cette recherche.</div>";
      return;
    }

    grid.innerHTML = filtered.map(w => {
      const realIdx = LEXIQUE.indexOf(w);
      return `
        <div class="word-card" onclick="openModal(${realIdx})">
          <div class="word-lv">Niv. ${w.level}</div>
          <div class="word-main">${w.main}</div>
          <div class="word-trans">${w.trans}</div>
          <span class="word-cat">${w.cat}</span>
        </div>`;
    }).join("");
  }


  /* ══════════════════════════════════════════════════════
     🔍 FILTRES
     ══════════════════════════════════════════════════════ */

  function filterByLevel(lvl, btn) {
    currentLevel = lvl;
    document.querySelectorAll(".level-tab").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");
    renderWords();
  }

  function filterWords() {
    currentSearch = document.getElementById("searchBox").value;
    renderWords();
  }


  /* ══════════════════════════════════════════════════════
     🔍 MODALE DE DÉTAIL
     ══════════════════════════════════════════════════════ */

  function openModal(idx) {
    const w = LEXIQUE[idx];
    document.getElementById("modalMain").textContent  = w.main;
    document.getElementById("modalTrans").textContent = w.trans;
    document.getElementById("modalDef").textContent   = w.def;
    document.getElementById("modalEx").textContent    = w.ex;
    document.getElementById("modalCat").textContent   = w.cat + " • Niveau " + w.level;
    document.getElementById("modal").classList.add("show");
  }

  function closeModal(e) {
    if (!e || e.target.id === "modal")
      document.getElementById("modal").classList.remove("show");
  }


  /* ══════════════════════════════════════════════════════
     🚀 INITIALISATION — Gère les paramètres URL
         ?level=3   → filtre sur le niveau 3 au chargement
         #mot       → recherche le mot dès l'ouverture
     ══════════════════════════════════════════════════════ */
  document.addEventListener("DOMContentLoaded", () => {

    /* Récupère un mot-clé depuis l'ancre #mot */
    const hash = window.location.hash.replace("#", "");
    if (hash) {
      currentSearch = decodeURIComponent(hash);
      document.getElementById("searchBox").value = currentSearch;
    }

    /* Récupère un niveau depuis ?level=N */
    const lvlParam = new URLSearchParams(window.location.search).get("level");
    if (lvlParam) {
      currentLevel = parseInt(lvlParam);
      document.querySelectorAll(".level-tab").forEach((b, i) => {
        b.classList.toggle("active", i === currentLevel);
      });
    }

    renderWords();
  });

</script>
</body>
</html>
